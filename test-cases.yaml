all-grouper:
  name: All Grouper
  description: A demonstration of the speedmap workflow with "all" (i.e. no) grouping.
  params:
    workflow_details:
      name: "Speedmap Dashboard"
      description: "A dashboard for visualizing speedmap trajectories."
    er_client_name:
      data_source:
        name: "mep_dev"
    groupers:
      groupers: []
    time_range:
      timezone:
        label: UTC (UTC+00:00)
        tzCode: UTC
        name: (UTC+00:00) UTC
        utc: '+00:00'
      since: '2017-01-01T09:41:00.000'
      until: '2017-01-16T09:41:00.000'
    subject_obs:
      subject_group_name: "Ecoscope"
      include_inactive: false
    subject_traj:
      trajectory_segment_filter:
        min_length_meters: 0.001
        max_length_meters: 10000.0
        max_time_secs: 21600.0
        min_time_secs: 1.0
        max_speed_kmhr: 10.0
        min_speed_kmhr: 0.01
    base_map_defs:
      base_maps:
        - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
          opacity: 1.0
        - custom_url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
          custom_opacity: 0.5
          custom_max_zoom: 17
          custom_min_zoom: null

